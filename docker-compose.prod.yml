# Production overlay — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Adds nginx reverse proxy with SSL termination.
# Run deploy.sh first to obtain Let's Encrypt certificates.

services:
  nginx:
    image: nginx:alpine
    container_name: lexcorpus-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      frontend:
        condition: service_started
      api:
        condition: service_healthy
    restart: unless-stopped

  # In production the frontend API URL points to the public domain via nginx.
  # Ports are removed — nginx is the only public entry point.
  frontend:
    environment:
      - NEXT_PUBLIC_API_URL=https://${DOMAIN}/api
      - NEXTAUTH_URL=https://${DOMAIN}
    ports: !reset []

  api:
    ports: !reset []
