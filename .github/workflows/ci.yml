name: CI

on:
  push:
    branches: [main, master, "claude/**"]
  pull_request:
    branches: [main, master]

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi uvicorn pydantic python-dotenv \
            httpx pytest pytest-asyncio \
            openai qdrant-client sentence-transformers \
            fastembed asyncpg redis APScheduler

      - name: Run tests
        run: pytest tests/ -v --tb=short

  python-lint:
    name: Python lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check api/ rag/ scripts/ training/ tests/ --select E,F,W --ignore E501

  frontend-typecheck:
    name: Frontend type check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://x:x@localhost:5432/x"

      - name: TypeScript type check
        run: npx tsc --noEmit

  security-scan:
    name: Secret scanning
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for committed database files
        run: |
          if git ls-files '*.db' | grep -q .; then
            echo "ERROR: SQLite .db file tracked in git"
            git ls-files '*.db'
            exit 1
          fi
          echo "No .db files tracked"
