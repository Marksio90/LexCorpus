services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: lexcorpus-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  fetch:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: lexcorpus-fetch
    volumes:
      - ./data:/app/data
    restart: "no"
    environment:
      - FETCH_YEAR=${FETCH_YEAR:-}
      - FETCH_YEAR_FROM=${FETCH_YEAR_FROM:-2024}
      - FETCH_YEAR_TO=${FETCH_YEAR_TO:-2025}
    command: >
      sh -c "
        if ls /app/data/raw/acts_*.jsonl 1>/dev/null 2>&1; then
          echo 'Raw data already exists — skipping fetch.';
        else
          if [ -n \"$$FETCH_YEAR\" ]; then
            python scripts/fetch_isap.py --year $$FETCH_YEAR --output /app/data/raw/;
          else
            python scripts/fetch_isap.py --year-from $$FETCH_YEAR_FROM --year-to $$FETCH_YEAR_TO --output /app/data/raw/;
          fi
        fi
      "

  fetch-saos:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: lexcorpus-fetch-saos
    volumes:
      - ./data:/app/data
    restart: "no"
    environment:
      - SAOS_YEAR_FROM=${SAOS_YEAR_FROM:-2023}
      - SAOS_YEAR_TO=${SAOS_YEAR_TO:-2025}
      - SAOS_ENABLED=${SAOS_ENABLED:-true}
    command: >
      sh -c "
        if [ \"$$SAOS_ENABLED\" = 'false' ]; then
          echo 'SAOS fetch disabled (SAOS_ENABLED=false) — skipping.';
        elif ls /app/data/raw/saos_*.jsonl 1>/dev/null 2>&1; then
          echo 'SAOS data already exists — skipping fetch.';
        else
          python scripts/fetch_saos.py
            --year-from $$SAOS_YEAR_FROM
            --year-to $$SAOS_YEAR_TO
            --output /app/data/raw/;
        fi
      "

  fetch-eurlex:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: lexcorpus-fetch-eurlex
    volumes:
      - ./data:/app/data
    restart: "no"
    environment:
      - EURLEX_YEAR_FROM=${EURLEX_YEAR_FROM:-2020}
      - EURLEX_YEAR_TO=${EURLEX_YEAR_TO:-2025}
      - EURLEX_MAX_ACTS=${EURLEX_MAX_ACTS:-2000}
      - EURLEX_TYPES=${EURLEX_TYPES:-regulation,directive}
      - EURLEX_ENABLED=${EURLEX_ENABLED:-true}
    command: >
      sh -c "
        if [ \"$$EURLEX_ENABLED\" = 'false' ]; then
          echo 'EUR-Lex fetch disabled (EURLEX_ENABLED=false) — skipping.';
        elif ls /app/data/raw/eurlex_*.jsonl 1>/dev/null 2>&1; then
          echo 'EUR-Lex data already exists — skipping fetch.';
        else
          python scripts/fetch_eurlex.py
            --year-from $$EURLEX_YEAR_FROM
            --year-to $$EURLEX_YEAR_TO
            --type $$EURLEX_TYPES
            --max-acts $$EURLEX_MAX_ACTS
            --output /app/data/raw/;
        fi
      "

  preprocess:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: lexcorpus-preprocess
    volumes:
      - ./data:/app/data
    depends_on:
      fetch:
        condition: service_completed_successfully
      fetch-saos:
        condition: service_completed_successfully
      fetch-eurlex:
        condition: service_completed_successfully
    restart: "no"
    command: >
      sh -c "
        if [ -f /app/data/processed/chunks.jsonl ]; then
          echo 'Processed chunks already exist — skipping preprocess.';
        else
          python scripts/preprocess.py
            --input /app/data/raw/
            --output /app/data/processed/;
        fi
      "

  ingest:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: lexcorpus-ingest
    environment:
      - QDRANT_PATH=http://qdrant:6333
      - QDRANT_COLLECTION=lexcorpus
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-paraphrase-multilingual-MiniLM-L12-v2}
      - LOCAL_MODEL_PATH=${LOCAL_MODEL_PATH:-}
    volumes:
      - ./data:/app/data
    depends_on:
      qdrant:
        condition: service_healthy
      preprocess:
        condition: service_completed_successfully
    restart: "no"
    command: >
      sh -c "
        SENTINEL=/app/data/qdrant/.ingested;
        if [ -f \"$$SENTINEL\" ]; then
          echo 'Qdrant already ingested (sentinel exists) — skipping.';
        else
          python rag/ingest.py
            --input /app/data/processed/chunks.jsonl
            --qdrant http://qdrant:6333
            --model ${EMBEDDING_MODEL:-paraphrase-multilingual-MiniLM-L12-v2}
            --recreate
          && touch \"$$SENTINEL\"
          && echo 'Ingest complete. Sentinel written.';
        fi
      "

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: lexcorpus-api
    ports:
      - "8000:8000"
    environment:
      - QDRANT_PATH=http://qdrant:6333
      - QDRANT_COLLECTION=lexcorpus
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sdadas/mmlw-retrieval-roberta-large}
      - RERANK_MODEL=${RERANK_MODEL:-cross-encoder/mmarco-mMiniLMv2-L12-H384-v1}
      - RERANK_ENABLED=${RERANK_ENABLED:-true}
      - EXPAND_ENABLED=${EXPAND_ENABLED:-true}
      - LOCAL_MODEL_PATH=${LOCAL_MODEL_PATH:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-20}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-60}
      - SYNC_ENABLED=${SYNC_ENABLED:-true}
      - SYNC_CRON=${SYNC_CRON:-0 3 * * 0}
      - SYNC_SINCE_DAYS=${SYNC_SINCE_DAYS:-8}
      - SYNC_SAOS_OUTPUT=/app/data/raw
      - SYNC_PROCESSED_DIR=/app/data/processed
    depends_on:
      qdrant:
        condition: service_healthy
      ingest:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lexcorpus-frontend
    ports:
      - "3000:3000"
    environment:
      # NEXT_PUBLIC_* vars are embedded at build time and used by the browser,
      # so this must be the host-visible URL, not the internal Docker network name.
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-in-production}
      - EMAIL_SERVER_HOST=${EMAIL_SERVER_HOST:-}
      - EMAIL_SERVER_PORT=${EMAIL_SERVER_PORT:-587}
      - EMAIL_SERVER_USER=${EMAIL_SERVER_USER:-}
      - EMAIL_SERVER_PASSWORD=${EMAIL_SERVER_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@lexcorpus.pl}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO:-}
      - STRIPE_PRICE_KANCELARIA=${STRIPE_PRICE_KANCELARIA:-}
      - DATABASE_PATH=${DATABASE_PATH:-/app/prisma/prod.db}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Training (GPU required) ────────────────────────────────────────────────
  # Run manually on a GPU machine:
  #   docker compose run --rm train
  # Or just generate synthetic data (no GPU needed):
  #   docker compose run --rm train python scripts/generate_training_data.py --max-chunks 5000
  train:
    build:
      context: .
      dockerfile: Dockerfile.train
    container_name: lexcorpus-train
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    profiles: ["train"]
    restart: "no"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - MAX_CHUNKS=${MAX_CHUNKS:-5000}
      - QUESTIONS_PER_CHUNK=${QUESTIONS_PER_CHUNK:-2}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Run manually to sync new SAOS judgments:
  #   docker compose run --rm sync-saos
  sync-saos:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: lexcorpus-sync-saos
    volumes:
      - ./data:/app/data
    profiles: ["sync"]
    restart: "no"
    command: >
      sh -c "
        python scripts/fetch_saos.py
          --since-date $$(date -d '7 days ago' +%Y-%m-%d)
          --output /app/data/raw/
        && rm -f /app/data/qdrant/.ingested
        && python rag/ingest.py
          --input /app/data/processed/chunks.jsonl
          --qdrant http://qdrant:6333
          --model ${EMBEDDING_MODEL:-paraphrase-multilingual-MiniLM-L12-v2}
        && touch /app/data/qdrant/.ingested
      "
    depends_on:
      qdrant:
        condition: service_healthy

volumes: {}
