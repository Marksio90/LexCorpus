services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: lexcorpus-qdrant
    # Ports deliberately NOT exposed to the host — Qdrant is only reachable
    # from within the Docker network by the api, ingest, and worker services.
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:?QDRANT_API_KEY is required}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 5

  fetch:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: lexcorpus-fetch
    volumes:
      - ./data:/app/data
    restart: "no"
    environment:
      - FETCH_YEAR=${FETCH_YEAR:-}
      - FETCH_YEAR_FROM=${FETCH_YEAR_FROM:-2024}
      - FETCH_YEAR_TO=${FETCH_YEAR_TO:-2025}
    command: >
      sh -c "
        if ls /app/data/raw/acts_*.jsonl 1>/dev/null 2>&1; then
          echo 'Raw data already exists — skipping fetch.';
        else
          if [ -n \"$$FETCH_YEAR\" ]; then
            python scripts/fetch_isap.py --year $$FETCH_YEAR --output /app/data/raw/;
          else
            python scripts/fetch_isap.py --year-from $$FETCH_YEAR_FROM --year-to $$FETCH_YEAR_TO --output /app/data/raw/;
          fi
        fi
      "

  fetch-saos:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: lexcorpus-fetch-saos
    volumes:
      - ./data:/app/data
    restart: "no"
    environment:
      - SAOS_YEAR_FROM=${SAOS_YEAR_FROM:-2023}
      - SAOS_YEAR_TO=${SAOS_YEAR_TO:-2025}
      - SAOS_ENABLED=${SAOS_ENABLED:-true}
    command: >
      sh -c "
        if [ \"$$SAOS_ENABLED\" = 'false' ]; then
          echo 'SAOS fetch disabled (SAOS_ENABLED=false) — skipping.';
        elif ls /app/data/raw/saos_*.jsonl 1>/dev/null 2>&1; then
          echo 'SAOS data already exists — skipping fetch.';
        else
          python scripts/fetch_saos.py --year-from $$SAOS_YEAR_FROM --year-to $$SAOS_YEAR_TO --output /app/data/raw/;
        fi
      "

  fetch-eurlex:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: lexcorpus-fetch-eurlex
    volumes:
      - ./data:/app/data
    restart: "no"
    environment:
      - EURLEX_YEAR_FROM=${EURLEX_YEAR_FROM:-2020}
      - EURLEX_YEAR_TO=${EURLEX_YEAR_TO:-2025}
      - EURLEX_MAX_ACTS=${EURLEX_MAX_ACTS:-2000}
      - EURLEX_TYPES=${EURLEX_TYPES:-regulation,directive}
      - EURLEX_ENABLED=${EURLEX_ENABLED:-true}
    command: >
      sh -c "
        if [ \"$$EURLEX_ENABLED\" = 'false' ]; then
          echo 'EUR-Lex fetch disabled (EURLEX_ENABLED=false) — skipping.';
        elif ls /app/data/raw/eurlex_*.jsonl 1>/dev/null 2>&1; then
          echo 'EUR-Lex data already exists — skipping fetch.';
        else
          python scripts/fetch_eurlex.py --year-from $$EURLEX_YEAR_FROM --year-to $$EURLEX_YEAR_TO --type $$EURLEX_TYPES --max-acts $$EURLEX_MAX_ACTS --output /app/data/raw/;
        fi
      "

  fetch-kis:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: lexcorpus-fetch-kis
    volumes:
      - ./data:/app/data
    restart: "no"
    environment:
      - KIS_YEAR_FROM=${KIS_YEAR_FROM:-2020}
      - KIS_YEAR_TO=${KIS_YEAR_TO:-2025}
      - KIS_MAX_ITEMS=${KIS_MAX_ITEMS:-}
      - KIS_ENABLED=${KIS_ENABLED:-true}
      - KIS_API_URL=${KIS_API_URL:-https://eureka.mf.gov.pl}
      - KIS_DELAY=${KIS_DELAY:-0.3}
      - KIS_MAX_PAGES=${KIS_MAX_PAGES:-50}
    command: >
      sh -c "
        if [ \"$$KIS_ENABLED\" = 'false' ]; then
          echo 'KIS fetch disabled (KIS_ENABLED=false) — skipping.';
        elif ls /app/data/raw/kis_*.jsonl 1>/dev/null 2>&1; then
          echo 'KIS data already exists — skipping fetch.';
        else
          python scripts/fetch_kis.py --year-from $$KIS_YEAR_FROM --year-to $$KIS_YEAR_TO ${KIS_MAX_ITEMS:+--max-items $$KIS_MAX_ITEMS} ${KIS_MAX_PAGES:+--max-pages $$KIS_MAX_PAGES} --output /app/data/raw/;
        fi
      "

  preprocess:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: lexcorpus-preprocess
    volumes:
      - ./data:/app/data
    depends_on:
      fetch:
        condition: service_completed_successfully
      fetch-saos:
        condition: service_completed_successfully
      fetch-eurlex:
        condition: service_completed_successfully
      fetch-kis:
        condition: service_completed_successfully
    restart: "no"
    environment:
      - PARENT_CHILD_CHUNKING=${PARENT_CHILD_CHUNKING:-false}
    command: >
      sh -c "
        if [ -f /app/data/processed/chunks.jsonl ]; then
          echo 'Processed chunks already exist — skipping preprocess.';
        else
          EXTRA_FLAGS='';
          if [ \"$$PARENT_CHILD_CHUNKING\" = 'true' ]; then
            EXTRA_FLAGS='--parent-child';
            echo 'Parent-child chunking enabled.';
          fi;
          python scripts/preprocess.py --input /app/data/raw/ --output /app/data/processed/ $$EXTRA_FLAGS;
        fi
      "

  ingest:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: lexcorpus-ingest
    environment:
      - QDRANT_PATH=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:?QDRANT_API_KEY is required}
      - QDRANT_COLLECTION=lexcorpus
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sdadas/mmlw-retrieval-roberta-large-v2}
      - LOCAL_MODEL_PATH=${LOCAL_MODEL_PATH:-}
    volumes:
      - ./data:/app/data
    depends_on:
      qdrant:
        condition: service_healthy
      preprocess:
        condition: service_completed_successfully
    restart: "no"
    command: >
      sh -c "SENTINEL=/app/data/qdrant/.ingested; if [ -f \"$$SENTINEL\" ]; then echo 'Qdrant already ingested (sentinel exists) — skipping.'; else python rag/ingest.py --input /app/data/processed/chunks.jsonl --qdrant http://qdrant:6333 --api-key ${QDRANT_API_KEY} --model ${EMBEDDING_MODEL:-sdadas/mmlw-retrieval-roberta-large-v2} --recreate && touch \"$$SENTINEL\" && echo 'Ingest complete. Sentinel written.'; fi"

  postgres:
    image: postgres:16-alpine
    container_name: lexcorpus-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-lexcorpus}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-lexcorpus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lexcorpus} -d ${POSTGRES_DB:-lexcorpus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lexcorpus-redis
    restart: unless-stopped
    command: >-
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: lexcorpus-api
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    environment:
      - QDRANT_PATH=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:?QDRANT_API_KEY is required}
      - QDRANT_COLLECTION=lexcorpus
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sdadas/mmlw-retrieval-roberta-large-v2}
      - "EMBED_QUERY_PREFIX=${EMBED_QUERY_PREFIX:-[query]: }"
      - RERANK_MODEL=${RERANK_MODEL:-sdadas/polish-reranker-large-ranknet}
      - RERANK_ENABLED=${RERANK_ENABLED:-true}
      - EXPAND_ENABLED=${EXPAND_ENABLED:-true}
      - HYDE_ENABLED=${HYDE_ENABLED:-true}
      - CRAG_ENABLED=${CRAG_ENABLED:-true}
      - CRAG_LOW_THRESHOLD=${CRAG_LOW_THRESHOLD:--3.0}
      - ADAPTIVE_RAG_ENABLED=${ADAPTIVE_RAG_ENABLED:-true}
      - LOCAL_MODEL_PATH=${LOCAL_MODEL_PATH:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-20}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-60}
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://${POSTGRES_USER:-lexcorpus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lexcorpus}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:?INTERNAL_API_SECRET is required}
      - SYNC_ENABLED=${SYNC_ENABLED:-true}
      - SYNC_CRON=${SYNC_CRON:-0 3 * * 0}
      - SYNC_SINCE_DAYS=${SYNC_SINCE_DAYS:-8}
      - SYNC_SAOS_OUTPUT=/app/data/raw
      - SYNC_PROCESSED_DIR=/app/data/processed
      - HF_TOKEN=${HF_TOKEN:-}
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ingest:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/ping')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lexcorpus-frontend
    ports:
      - "3000:3000"
    environment:
      # NEXT_PUBLIC_* vars are embedded at build time and used by the browser,
      # so this must be the host-visible URL, not the internal Docker network name.
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-in-production}
      - EMAIL_SERVER_HOST=${EMAIL_SERVER_HOST:-}
      - EMAIL_SERVER_PORT=${EMAIL_SERVER_PORT:-587}
      - EMAIL_SERVER_USER=${EMAIL_SERVER_USER:-}
      - EMAIL_SERVER_PASSWORD=${EMAIL_SERVER_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@lexcorpus.pl}
      - ADMIN_EMAILS=${ADMIN_EMAILS:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO:-}
      - STRIPE_PRICE_KANCELARIA=${STRIPE_PRICE_KANCELARIA:-}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-lexcorpus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lexcorpus}
      - BACKEND_URL=http://api:8000
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:?INTERNAL_API_SECRET is required}
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: lexcorpus-worker
    command: celery -A api.tasks worker --loglevel=info --concurrency=2
    volumes:
      - ./data:/app/data
      - private_data:/app/data/private
      - hf_cache:/root/.cache/huggingface
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://${POSTGRES_USER:-lexcorpus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lexcorpus}
      - QDRANT_PATH=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:?QDRANT_API_KEY is required}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sdadas/mmlw-retrieval-roberta-large-v2}
      - HF_TOKEN=${HF_TOKEN:-}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  # ── Training (GPU required) ────────────────────────────────────────────────
  # Run manually on a GPU machine:
  #   docker compose run --rm train
  # Or just generate synthetic data (no GPU needed):
  #   docker compose run --rm train python scripts/generate_training_data.py --max-chunks 5000
  train:
    build:
      context: .
      dockerfile: Dockerfile.train
    container_name: lexcorpus-train
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    profiles: ["train"]
    restart: "no"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - MAX_CHUNKS=${MAX_CHUNKS:-5000}
      - QUESTIONS_PER_CHUNK=${QUESTIONS_PER_CHUNK:-2}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Run manually to sync new SAOS judgments:
  #   docker compose run --rm sync-saos
  sync-saos:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: lexcorpus-sync-saos
    volumes:
      - ./data:/app/data
    profiles: ["sync"]
    restart: "no"
    command: >
      sh -c "
        python scripts/fetch_saos.py --since-date $$(date -d '7 days ago' +%Y-%m-%d) --output /app/data/raw/
        && rm -f /app/data/qdrant/.ingested
        && python rag/ingest.py --input /app/data/processed/chunks.jsonl --qdrant http://qdrant:6333 --model ${EMBEDDING_MODEL:-sdadas/mmlw-retrieval-roberta-large-v2}
        && touch /app/data/qdrant/.ingested
      "
    depends_on:
      qdrant:
        condition: service_healthy

volumes:
  postgres_data:
  private_data:
  hf_cache:
